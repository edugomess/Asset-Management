name: 🚀 Deploy via FTP

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: 🎉 Deploy
    runs-on: ubuntu-latest
    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v4
    
    - name: 📂 Sync files
      uses: SamKirkland/FTP-Deploy-Action@v4.3.4
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        server-dir: ./  # Pasta no servidor onde o site fica (ex: public_html/ ou htdocs/)
        exclude: |
          **/.git*
          **/.git*/**
          **/node_modules/**
          .github/**
          db_backup.sql
          credentials.php # Evita sobrescrever suas credenciais de produção
