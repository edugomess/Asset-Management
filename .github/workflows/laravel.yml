name: Pipeline de Testes (Laravel)

# GATILHOS: Define quando o workflow será executado (ao fazer push ou pull request na branch main)
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  laravel-tests:
    # AMBIENTE: Executa em uma máquina virtual Ubuntu atualizada
    runs-on: ubuntu-latest

    steps:
      # CONFIGURAÇÃO DO PHP: Instala a versão correta do ambiente
      - uses: shivammathur/setup-php@15c43e89cdef867065b0213be354c2841860869e
        with:
          php-version: "8.0"

      # CHECKOUT: Baixa o código do repositório para o runner
      - uses: actions/checkout@v4

      # CONFIGURAÇÃO DE AMBIENTE: Prepara o arquivo .env a partir do exemplo
      - name: Copiar arquivo .env
        run: php -r "file_exists('.env') || copy('.env.example', '.env');"

      # DEPENDÊNCIAS: Instala as bibliotecas do projeto via Composer de forma silenciosa
      - name: Instalar Dependências (Composer)
        run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

      # SEGURANÇA: Gera a chave de criptografia da aplicação
      - name: Gerar Chave da Aplicação (App Key)
        run: php artisan key:generate

      # PERMISSÕES: Garante que o PHP possa escrever nos diretórios de sistema
      - name: Configurar Permissões de Diretório
        run: chmod -R 777 storage bootstrap/cache

      # BANCO DE DADOS DE TESTE: Cria um banco SQLite temporário
      - name: Criar Banco de Dados SQLite
        run: |
          mkdir -p database
          touch database/database.sqlite

      # EXECUÇÃO: Roda os testes unitários e de funcionalidade via PHPUnit/Pest
      - name: Executar Testes Automatizados
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite
        run: php artisan test
